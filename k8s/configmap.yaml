apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-config
  namespace: delivery
data:
  REDIS_HOST: redis
  REDIS_PORT: '6379'
  REDIS_PASSWORD: ''
  CATALOG_SERVICE_URL: http://catalog-service:3001
  FLEET_SERVICE_URL: http://fleet-service:3002
  ORDER_SERVICE_URL: http://order-service:3003
  GATEWAY_REQUIRE_JWT: 'false'
  HTTP_CLIENT_TIMEOUT_MS: '5000'
  JWT_EXPIRES_IN: 1h
  CATALOG_INTERNAL_API_KEY: ''
  FLEET_INTERNAL_API_KEY: ''
  INTERNAL_API_KEY: ''
