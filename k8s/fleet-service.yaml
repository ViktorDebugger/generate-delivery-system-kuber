apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  namespace: delivery
  labels:
    app: fleet-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-service
  template:
    metadata:
      labels:
        app: fleet-service
    spec:
      containers:
        - name: fleet-service
          image: delivery-system/fleet-service:local
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: delivery-config
          env:
            - name: PORT
              value: '3002'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delivery-secrets
                  key: fleet-database-url
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-service
  namespace: delivery
  labels:
    app: fleet-service
spec:
  type: ClusterIP
  selector:
    app: fleet-service
  ports:
    - port: 3002
      targetPort: http
      name: http
