apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: delivery
  labels:
    app: catalog-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: delivery-system/catalog-service:local
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: delivery-config
          env:
            - name: PORT
              value: '3001'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delivery-secrets
                  key: catalog-database-url
            - name: DEV_POD_IDENTITY
              value: 'true'
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: delivery
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: http
      name: http
