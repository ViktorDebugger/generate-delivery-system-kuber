apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: delivery
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: delivery-secrets
  namespace: delivery
type: Opaque
stringData:
  catalog-database-url: postgresql://postgres:postgres@postgres:5432/catalog?schema=public
  fleet-database-url: postgresql://postgres:postgres@postgres:5432/fleet?schema=public
  orders-database-url: postgresql://postgres:postgres@postgres:5432/orders?schema=public
  jwt-secret: docker-dev-jwt-secret-change-me-in-production-min-32
