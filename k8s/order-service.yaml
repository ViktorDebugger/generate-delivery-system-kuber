apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: delivery
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: delivery-system/order-service:local
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: delivery-config
          env:
            - name: PORT
              value: '3003'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delivery-secrets
                  key: orders-database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: delivery-secrets
                  key: jwt-secret
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: delivery
  labels:
    app: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: http
      name: http
