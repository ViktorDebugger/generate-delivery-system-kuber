services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  catalog-service:
    build:
      context: ./apps/catalog-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/catalog?schema=public
      PORT: '3001'
      INTERNAL_API_KEY: ''
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3001/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  fleet-service:
    build:
      context: ./apps/fleet-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fleet?schema=public
      PORT: '3002'
      INTERNAL_API_KEY: ''
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3002/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  order-service:
    build:
      context: ./apps/order-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orders?schema=public
      PORT: '3003'
      CATALOG_SERVICE_URL: http://catalog-service:3001
      CATALOG_INTERNAL_API_KEY: ''
      FLEET_SERVICE_URL: http://fleet-service:3002
      FLEET_INTERNAL_API_KEY: ''
      HTTP_CLIENT_TIMEOUT_MS: '5000'
      JWT_SECRET: docker-dev-jwt-secret-change-me-in-production-min-32
      JWT_EXPIRES_IN: '1h'
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      fleet-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3003/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    environment:
      PORT: '3000'
      GATEWAY_REQUIRE_JWT: 'false'
      JWT_SECRET: docker-dev-jwt-secret-change-me-in-production-min-32
      CATALOG_SERVICE_URL: http://catalog-service:3001
      FLEET_SERVICE_URL: http://fleet-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
    ports:
      - '3000:3000'
    depends_on:
      catalog-service:
        condition: service_healthy
      fleet-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
